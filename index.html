<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allan Cowan</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* Hero with vibrant gradient */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #ff6b6b 70%, #ffa07a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .lead {
            font-size: 1.6rem;
            font-weight: 400;
            max-width: 700px;
            margin: 0 auto 2.5rem;
            opacity: 0.95;
        }

        .btn-explore {
            font-size: 1.3rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: all 0.4s ease;
        }

        .btn-explore:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            background: #fff;
            color: #764ba2;
        }

        /* Floating colorful shapes for visual interest */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.18;
            pointer-events: none;
        }

        .shape1 { width: 400px; height: 400px; background: #ff6b6b; top: 10%; left: 15%; animation: float 18s infinite ease-in-out; }
        .shape2 { width: 300px; height: 300px; background: #4facfe; bottom: 15%; right: 10%; animation: float 22s infinite ease-in-out reverse; }
        .shape3 { width: 500px; height: 500px; background: #ffa07a; top: 40%; right: 20%; animation: float 25s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(80px, -60px) rotate(15deg); }
            50% { transform: translate(-50px, 100px) rotate(-10deg); }
            75% { transform: translate(60px, 40px) rotate(20deg); }
        }

        /* Navigation - semi-transparent vibrant */
        .navbar {
            background: rgba(102, 126, 234, 0.75) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.4s;
        }

        .navbar.scrolled {
            background: rgba(102, 126, 234, 0.95) !important;
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: #ffdd57 !important;
        }

        footer {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 2.5rem 0;
            text-align: center;
            margin-top: 3rem;
        }

        @media (max-width: 992px) {
            h1 { font-size: 4.2rem; }
            .lead { font-size: 1.4rem; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            .lead { font-size: 1.3rem; }
            .shape { display: none; } /* simplify on mobile */
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#">Allan Cowan</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section - Now the main colorful content -->
    <section class="hero" id="home">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>

        <div class="hero-content">
            <h1>Allan Cowan</h1>
            <p class="lead">Creative mind • Problem solver • Toronto-based enthusiast</p>
            <a href="#contact" class="btn btn-explore">Say Hello →</a>
        </div>
    </section>

    <!-- Simple Footer with contact hint -->
    <footer>
        <div class="container">
            <p class="mb-2">Toronto, Ontario • 2026</p>
            <p class="mb-1">allancowan@hotmail.com</p>
            <p class="small">&copy; Allan Cowan. Made with vibrant energy.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Navbar scroll effect -->
    <script>
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
